type User @model @auth(rules: [{allow: public}]) {
  id: ID!
  name: String!
  email: String!
  onboardingCompleted: Boolean!
  targetLanguage: String
  currentLevel: String
}

type Session @model @auth(rules: [{ allow: owner }]) {
  id: ID!
  categoryId: String!
  targetLanguage: String!
  analysisJson: AWSJSON!
}

type UserConfig @model @auth(rules: [{ allow: owner }]) {
  id: ID!
  voiceToVoiceEnabled: Boolean!
  voiceId: String!
}

input AssistantMessageInput {
  role: String!
  content: String!
}

type Query {
  assistantReply(
    messages: [AssistantMessageInput!]!
    targetLanguage: String
    categoryId: String
    maxTokens: Int
    sessionAnalysisTurn: Boolean
    languageLevel: String
  ): String
    @function(name: "bedrockAssistant")
    @auth(rules: [{ allow: private }])
}
